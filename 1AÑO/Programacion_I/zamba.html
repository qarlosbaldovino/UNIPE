    <category name="Primitivas">

        <block type="cambiar_color_texto"></block>

    <category name="Funciones">

                <field name="NUM"></field>
            </value>
        </block>
        <block type="caracter_de_cadena">  
            <value name="CADENA">
                <field name="NUM"></field>
            </value>
        </block>
        <block type="text_join"></block>
        <block type="obtener_entrada_numerica">  
            <value name="TEXTO">
                <field name="NUM"></field>
            </value>
        </block>
        <block type="longitud_cadena">  
            <value name="TEXTO">
                <field name="NUM"></field>
            </value>
        </block>
        <block type="math_random_int">
            <value name="entre">
            </value>
            <value name="y">
            </value>
        </block>
    </category>
    <category name="Repeticiones">
        <block type="controls_repeat_ext">
            <value name="TIMES">
                <block type="math_number">
                    <field name="NUM"></field>
                </block>
            </value>
        </block>
        <block type="controls_whileUntil"></block>
    </category>
    <category name="Alternativas">
        <block type="controls_if"></block>

            <mutation else="1"></mutation>
        </block>
    </category>

      <field name="OP">ADD</field>

          <field name="NUM"></field>
        
      </field></value>
      <value name="B">
        <field type="math_number">
          <field name="NUM"></field>
        
      </field></value>
    </block>
    <block type="math_modulo">
      <value name="DIVIDEND">
        <field name="NUM"></field>
      </value>
      <value name="DIVISOR">
          <field name="NUM"></field>
      </value>
    </block></category>
    <category name="Operadores relacionales">
        <block type="logic_compare"></block>
    </category>
    <category name="Operadores lógicos">
        <block type="logic_operation"></block>

    </category>

            <field name="NUM">0</field>
        </block>

    </category>

    </category>
